<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recherche Articles</title>
  <script
    id="sap-ui-bootstrap"
    src="/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-libs="sap.m,sap.f,sap.ui.layout"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-resourceroots='{"com.articles.search": "./"}'
  ></script>
  <script>
    sap.ui.getCore().attachInit(function () {
      sap.ui.require(["sap/ui/core/ComponentContainer"], function (ComponentContainer) {
        new ComponentContainer({
          name: "com.articles.search",
          settings: { id: "myApp" },
          async: true,
          height: "100%"
        }).placeAt("content");
      });
    });
  </script>
</head>
<body class="sapUiBody" id="content" style="height:100%;margin:0;padding:0;">
</body>
</html>
